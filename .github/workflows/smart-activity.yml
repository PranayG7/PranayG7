name: Smart DSA Tracker

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update tracker section
        run: |
          DATE=$(date +"%d %B %Y")

          progress=(
            "Solved DSA problems"
            "Practiced problem solving"
            "Revised concepts"
            "Worked on backend"
            "Improved coding skills"
            "Studied algorithms"
          )

          focus=(
            "Data Structures & Algorithms"
            "Backend Development"
            "Full Stack Development"
          )

          PROG=${progress[$RANDOM % ${#progress[@]}]}
          CURR=${focus[$RANDOM % ${#focus[@]}]}

          NEW_CONTENT="📅 Last Updated: $DATE\n🧠 Current Focus: $CURR\n🔥 Daily Progress: $PROG"

          awk -v new_content="$NEW_CONTENT" '
          /<!-- AUTO-UPDATE-START -->/ {
              print;
              print new_content;
              skip=1;
              next;
          }
          /<!-- AUTO-UPDATE-END -->/ {
              skip=0;
          }
          !skip
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit changes
        run: |
          git config --global user.name "Pranay Grover"
          git config --global user.email "pranaygrover127@gmail.com"

          git add README.md
          git commit -m "Updated daily dev tracker" || echo "No changes"
          git push
